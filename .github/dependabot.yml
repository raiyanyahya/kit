version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: electron
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    groups:
      dev-tools:
        patterns:
          - "esbuild"
          - "jest*"
          - "electron-builder"
      ai-runtime:
        patterns:
          - "@anthropic-ai/*"
          - "openai"
          - "nodemailer"
