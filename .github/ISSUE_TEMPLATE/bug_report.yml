name: Bug report
description: Something is broken or not working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report this.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Kit
        2. Go to ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Kit version
      placeholder: e.g. 2.0.0
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Open DevTools with Ctrl+Shift+I and paste any console errors here.
