name: Feature request
description: Suggest something new for Kit
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Got an idea? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that Kit doesn't support today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe your idea as clearly as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches you thought about?
